<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Auction — TV Screen</title>
<style>
:root {
  --bg: #060b14;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.07);
  --accent: #38bdf8;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --text: #f1f5f9;
  --muted: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

/* Animated gradient BG */
.bg-glow {
  position: fixed; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.07) 0%, transparent 50%);
}

.screen { height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }

/* Header bar */
.header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
.header-brand { font-size: 18px; font-weight: 800; letter-spacing: 3px; color: var(--accent); }
.header-status { display: flex; align-items: center; gap: 8px; padding: 8px 20px; border-radius: 30px; font-size: 14px; font-weight: 700; }
.status-live { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: var(--green); }
.status-paused { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: var(--red); }
.live-pulse { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
.header-time { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }

/* No player state */
.waiting { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
.waiting-icon { font-size: 80px; opacity: 0.3; }
.waiting h2 { font-size: 32px; font-weight: 800; color: var(--muted); }
.waiting p { color: var(--muted); font-size: 16px; }

/* Main content */
.main-content { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0; }

/* Left: Player */
.player-side { padding: 40px 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; border-right: 1px solid var(--border); }
.player-photo-wrap { position: relative; }
.player-photo { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent); box-shadow: 0 0 60px rgba(56,189,248,0.3), 0 0 120px rgba(56,189,248,0.1); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 80px; font-weight: 800; color: var(--muted); }
.player-name { font-size: 44px; font-weight: 900; text-align: center; letter-spacing: -1px; line-height: 1.1; }
.player-sub { font-size: 18px; color: var(--muted); text-align: center; margin-top: 4px; }
.player-tags { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
.player-tag { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 14px; color: var(--muted); }
.lot-badge { font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

/* Right: Bidding */
.bid-side { padding: 40px 50px; display: flex; flex-direction: column; justify-content: center; gap: 32px; }
.base-price-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.base-price-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.base-price-val { font-size: 20px; font-weight: 700; color: var(--muted); }

.current-bid-block { text-align: center; padding: 32px; background: linear-gradient(135deg, rgba(56,189,248,0.06), rgba(99,102,241,0.06)); border: 1px solid rgba(56,189,248,0.15); border-radius: 16px; }
.current-bid-label { font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
.current-bid-amount { font-size: 72px; font-weight: 900; color: var(--accent); line-height: 1; transition: all 0.3s; }
.current-bid-amount.bump { transform: scale(1.08); color: var(--green); }

.leading-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
.leading-team-badge { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: white; flex-shrink: 0; }
.leading-team-info { flex: 1; }
.leading-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.leading-name { font-size: 24px; font-weight: 800; }

/* Bottom: Teams ticker */
.teams-ticker { padding: 14px 40px; background: rgba(0,0,0,0.5); border-top: 1px solid var(--border); display: flex; gap: 24px; align-items: center; overflow: hidden; }
.ticker-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.ticker-teams { display: flex; gap: 20px; align-items: center; overflow-x: auto; }
.ticker-team { display: flex; align-items: center; gap: 8px; padding: 5px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; white-space: nowrap; }
.ticker-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.ticker-team-name { font-size: 12px; font-weight: 600; }
.ticker-purse { font-size: 11px; color: var(--green); font-weight: 700; }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="screen">
  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">⚡ PRO LEAGUE AUCTION 2026</div>
    <div id="header-status" class="header-status status-paused">
      <div class="live-pulse"></div>
      <span id="status-text">Waiting...</span>
    </div>
    <div class="header-time" id="clock">—</div>
  </div>

  <!-- WAITING STATE -->
  <div class="waiting" id="waiting-state">
    <div class="waiting-icon">🎯</div>
    <h2>Ready for Action</h2>
    <p>Admin will set the next player on block shortly</p>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="main-content" style="display:none">
    <!-- Player Side -->
    <div class="player-side">
      <div class="lot-badge" id="lot-badge">LOT #—</div>
      <div class="player-photo-wrap">
        <div class="player-photo" id="player-photo">?</div>
      </div>
      <div>
        <div class="player-name" id="player-name">—</div>
        <div class="player-sub" id="player-sub">—</div>
      </div>
      <div class="player-tags" id="player-tags"></div>
    </div>

    <!-- Bid Side -->
    <div class="bid-side">
      <div class="base-price-row">
        <div class="base-price-label">Base Price</div>
        <div class="base-price-val" id="base-price-display">—</div>
      </div>

      <div class="current-bid-block">
        <div class="current-bid-label">Current Highest Bid</div>
        <div class="current-bid-amount" id="bid-display">—</div>
      </div>

      <div class="leading-block" id="leading-block">
        <div class="leading-team-badge" id="leading-badge">?</div>
        <div class="leading-team-info">
          <div class="leading-label">Leading Team</div>
          <div class="leading-name" id="leading-name">No bids yet</div>
        </div>
      </div>
    </div>
  </div>

  <!-- TEAMS TICKER -->
  <div class="teams-ticker">
    <div class="ticker-label">TEAMS</div>
    <div class="ticker-teams" id="ticker-teams">
      <div style="color:var(--muted);font-size:12px">Loading teams...</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vtwdqrhzgfnxugtszfgg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0d2Rxcmh6Z2ZueHVndHN6ZmdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTYzMjEsImV4cCI6MjA5NjU3MjMyMX0.BrpUtQDOK_LzNZX4vL55wIVR7vJIUmwvkTHSM7UF9As';
const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };

async function sb(path) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: H });
  return res.json();
}

function fmt(n) { return n ? '₹' + Number(n).toLocaleString('en-IN') : '—'; }

// Clock
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}, 1000);

let prevBid = 0;
let prevStateStr = '';

async function poll() {
  const [stateArr, teams] = await Promise.all([
    sb('auction_state?id=eq.1&select=*,current_player_id(id,name,role,nationality,base_price,photo_url,lot_number),current_leader_team_id(id,name,color,short_code)'),
    sb('teams?select=name,color,short_code,purse_remaining&order=name.asc')
  ]);
  const s = stateArr[0] || {};
  const stateStr = JSON.stringify(s);
  if (stateStr !== prevStateStr) {
    prevStateStr = stateStr;
    render(s);
  }
  renderTicker(teams);
}

function render(s) {
  const player = s.current_player_id;
  const status = document.getElementById('header-status');
  const statusText = document.getElementById('status-text');

  if (s.is_live) {
    status.className = 'header-status status-live';
    statusText.textContent = '🔴 LIVE BIDDING';
  } else {
    status.className = 'header-status status-paused';
    statusText.textContent = player ? '⏸ Bidding Paused' : 'Waiting...';
  }

  if (!player) {
    document.getElementById('waiting-state').style.display = 'flex';
    document.getElementById('main-content').style.display = 'none';
    return;
  }

  document.getElementById('waiting-state').style.display = 'none';
  document.getElementById('main-content').style.display = 'grid';

  document.getElementById('lot-badge').textContent = 'LOT #' + (player.lot_number || '—');
  document.getElementById('player-name').textContent = player.name;
  document.getElementById('player-sub').textContent = player.role + (player.nationality ? ' · ' + player.nationality : '');
  document.getElementById('base-price-display').textContent = fmt(player.base_price);

  const photo = document.getElementById('player-photo');
  if (player.photo_url) {
    photo.style.fontSize = '0';
    photo.innerHTML = `<img src="${player.photo_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.parentElement.textContent='${player.name.charAt(0)}';this.parentElement.style.fontSize='80px'">`;
  } else {
    photo.innerHTML = '';
    photo.textContent = player.name.charAt(0);
    photo.style.fontSize = '80px';
  }

  // Bid display with bump animation
  const bidEl = document.getElementById('bid-display');
  const newBid = s.current_bid || player.base_price;
  if (newBid !== prevBid) {
    bidEl.classList.add('bump');
    setTimeout(() => bidEl.classList.remove('bump'), 400);
    prevBid = newBid;
  }
  bidEl.textContent = fmt(newBid);

  // Leading team
  const leader = s.current_leader_team_id;
  const badge = document.getElementById('leading-badge');
  badge.style.background = leader?.color || '#64748b';
  badge.textContent = leader?.short_code?.charAt(0) || '?';
  document.getElementById('leading-name').textContent = leader?.name || 'No bids yet';
}

function renderTicker(teams) {
  const el = document.getElementById('ticker-teams');
  el.innerHTML = teams.map(t => `<div class="ticker-team">
    <div class="ticker-dot" style="background:${t.color||'#64748b'}"></div>
    <div class="ticker-team-name">${t.name}</div>
    <div class="ticker-purse">${fmt(t.purse_remaining)}</div>
  </div>`).join('');
}

poll();
setInterval(poll, 1500);
</script>
</body>
</html>
